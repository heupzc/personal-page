<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Blog — 技术博客</title>
  <meta name="description" content="一个极简的技术博客，记录前端、DevOps、TypeScript 等技术思考与实践。">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">⚡</span> Tech Blog
      </a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="tags.html">标签</a></li>
      </ul>
      <div class="nav-actions">
        <div class="search-wrapper">
          <button class="search-btn" aria-label="搜索">🔍</button>
          <input type="text" class="search-input" placeholder="搜索文章...">
        </div>
        <button class="theme-toggle" aria-label="切换主题">🌙</button>
        <button class="mobile-menu-btn" aria-label="菜单">☰</button>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="container">
    <!-- Hero 区域 -->
    <section class="hero fade-in">
      <div class="hero-avatar">👨‍💻</div>
      <h1>欢迎来到我的技术博客</h1>
      <p>记录前端、DevOps、TypeScript 等技术领域的思考与实践，用文字沉淀经验。</p>
      <div class="hero-tags">
        <span class="hero-tag">前端</span>
        <span class="hero-tag">DevOps</span>
        <span class="hero-tag">TypeScript</span>
        <span class="hero-tag">Docker</span>
        <span class="hero-tag">性能优化</span>
      </div>
    </section>

    <!-- 文章列表 -->
    <section class="posts-section">
      <h2 class="section-title fade-in">最新文章</h2>
      <div class="posts-grid"></div>
      <div class="no-results" style="display:none;">
        <div class="emoji">🔍</div>
        <p>没有找到匹配的文章</p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2025 Tech Blog · 用文字记录技术之旅</p>
    </div>
  </footer>

  <!-- 回到顶部 -->
  <button class="back-to-top" aria-label="回到顶部">↑</button>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/posts.js"></script>

</body>
</html>
